server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /optional/docusaurus-site {
        return 301 /optional/vitepress-site;
    }

    location = /optional/docusaurus-site/ {
        return 301 /optional/vitepress-site;
    }

    # VitePress search is a site-wide modal rather than a dedicated page.
    location ~ ^/search/?$ {
        return 302 /;
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    error_page 404 /404.html;

    location = /404.html {
        internal;
    }
}
