apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: unpoller
  namespace: monitoring
  labels:
    app.kubernetes.io/name: unpoller
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: unpoller
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
              operator.prometheus.io/name: kube-prometheus-stack-prometheus
      ports:
        - protocol: TCP
          port: 9130
  egress:
    - to:
        - ipBlock:
            cidr: 192.168.40.1/32
      ports:
        - protocol: TCP
          port: 443
