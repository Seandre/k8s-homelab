apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: homepage-host-exporters
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  jobName: homepage-host-exporters
  metricsPath: /metrics
  scrapeInterval: 15s
  scrapeTimeout: 5s
  scheme: http
  staticConfigs:
    - targets:
        - 192.168.40.20:9100
      labels:
        hostname: pve-01
        role: proxmox
    - targets:
        - 192.168.40.25:9100
      labels:
        hostname: pve-02
        role: proxmox
    - targets:
        - 192.168.40.34:9100
      labels:
        hostname: pbs-01
        role: backup
    - targets:
        - 192.168.40.33:9100
      labels:
        hostname: bastion-01
        role: infrastructure
