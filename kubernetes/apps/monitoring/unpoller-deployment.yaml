apiVersion: apps/v1
kind: Deployment
metadata:
  name: unpoller
  namespace: monitoring
  labels:
    app.kubernetes.io/name: unpoller
    app.kubernetes.io/component: unifi-pdu-exporter
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: unpoller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: unpoller
        app.kubernetes.io/component: unifi-pdu-exporter
    spec:
      automountServiceAccountToken: false
      hostAliases:
        - ip: 192.168.40.1
          hostnames:
            - unifi.local
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: unpoller
          image: ghcr.io/unpoller/unpoller:v3.3.1@sha256:9dcccdc931a6830735f6978caf8cd67699b0dc33e37cf9ef4638611791c4df62
          imagePullPolicy: IfNotPresent
          env:
            # Go uses this bundle for the normal TLS trust store; the UnPoller
            # config also names it explicitly as the accepted controller chain.
            - name: SSL_CERT_FILE
              value: /etc/unpoller/tls/unifi-ca.crt
          ports:
            - name: metrics
              containerPort: 9130
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 3
          readinessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: controller-config
              mountPath: /etc/unpoller/up.conf
              subPath: up.conf
              readOnly: true
            - name: unifi-ca
              mountPath: /etc/unpoller/tls
              readOnly: true
      volumes:
        # Create this manually; it intentionally is not represented in Git.
        # Its complete `up.conf` is documented in homepage-observability.md.
        - name: controller-config
          secret:
            secretName: unpoller-unifi-readonly
            defaultMode: 0440
            items:
              - key: up.conf
                path: up.conf
        - name: unifi-ca
          configMap:
            name: unpoller-unifi-ca
            defaultMode: 0444
