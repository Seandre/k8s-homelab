# Prepared for the custom homepage Deployment only. This file is deliberately
# not referenced by the existing stock Homepage kustomization or Deployment.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: homepage-custom-k3s-reader
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage-custom
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: homepage-custom-k3s-reader
  labels:
    app.kubernetes.io/name: homepage-custom
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: homepage-custom-k3s-reader
  labels:
    app.kubernetes.io/name: homepage-custom
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: homepage-custom-k3s-reader
subjects:
  - kind: ServiceAccount
    name: homepage-custom-k3s-reader
    namespace: homepage
