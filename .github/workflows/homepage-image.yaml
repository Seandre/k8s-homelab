name: Verify and publish Homepage image

on:
  pull_request:
    paths:
      - homepage/**
      - .github/workflows/homepage-image.yaml
  push:
    branches: [main]
    paths:
      - homepage/**
      - .github/workflows/homepage-image.yaml
  workflow_dispatch:

concurrency:
  group: homepage-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/k8s-homelab-homepage

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: homepage
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: homepage/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run lint && npm run typecheck && npm test -- --run && npm run test:integration && npm run test:e2e && npm run build
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: homepage
          push: false
          tags: homepage:verify
          load: true
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: homepage:verify
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

  publish:
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
      - uses: docker/build-push-action@v6
        with:
          context: homepage
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max
