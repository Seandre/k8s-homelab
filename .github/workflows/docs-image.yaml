name: Build homelab documentation image

on:
  push:
    branches:
      - main
    paths:
      - docs/**
      - docs-site/Dockerfile
      - docs-site/docusaurus/**
      - .dockerignore
      - .github/workflows/docs-image.yaml
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: docs-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/seandre/k8s-homelab-docs
  DOCKER_METADATA_SHORT_SHA_LENGTH: 7

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docs-site/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pin and deploy the immutable image
        env:
          DEPLOYMENT_FILE: kubernetes/apps/homelab-docs/deployment.yaml
        run: |
          set -euo pipefail

          image_tag="sha-${GITHUB_SHA::7}"
          image="${IMAGE_NAME}:${image_tag}"

          python3 - "${DEPLOYMENT_FILE}" "${image}" <<'PY'
          import pathlib
          import re
          import sys

          deployment = pathlib.Path(sys.argv[1])
          image = sys.argv[2]
          contents = deployment.read_text()
          pattern = re.compile(
              r"^([ \t]*image:[ \t]*)ghcr\.io/seandre/k8s-homelab-docs:sha-[0-9a-f]+([ \t]*)$",
              re.MULTILINE,
          )
          updated, replacements = pattern.subn(
              lambda match: f"{match.group(1)}{image}{match.group(2)}",
              contents,
          )
          if replacements != 1:
              raise SystemExit(f"expected one docs image reference, found {replacements}")
          deployment.write_text(updated)
          PY

          if git diff --quiet -- "${DEPLOYMENT_FILE}"; then
            echo "${image} is already deployed"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${DEPLOYMENT_FILE}"
          git commit -m "deploy docs image ${image_tag}"

          git fetch origin main
          if [[ "$(git rev-parse origin/main)" != "${GITHUB_SHA}" ]]; then
            if ! git diff --quiet "${GITHUB_SHA}..origin/main" -- \
              docs \
              docs-site/Dockerfile \
              docs-site/docusaurus \
              .dockerignore \
              .github/workflows/docs-image.yaml; then
              echo "A newer documentation change exists; its workflow will deploy it"
              exit 0
            fi
            git rebase origin/main
          fi

          git push origin HEAD:main
