---
- name: Remove temporary launch keys from {{ hpl_benchmark_group }}
  ansible.builtin.file:
    path: "/home/{{ hpl_benchmark_user }}/.ssh/hpl-{{ hpl_effective_run_id }}-{{ hpl_benchmark_group }}{{ item.1 }}"
    state: absent
  loop: "{{ groups[hpl_benchmark_group] | product(['', '.pub']) | list }}"
  loop_control:
    label: "{{ item.0 }}{{ item.1 }}"
  delegate_to: "{{ item.0 }}"
  become: true
  no_log: true

- name: Remove temporary launch SSH config from {{ hpl_benchmark_group }}
  ansible.builtin.file:
    path: "/home/{{ hpl_benchmark_user }}/.ssh/config.d/hpl-{{ hpl_effective_run_id }}-{{ hpl_benchmark_group }}.conf"
    state: absent
  loop: "{{ groups[hpl_benchmark_group] }}"
  loop_control:
    label: "{{ item }}"
  delegate_to: "{{ item }}"
  become: true
  no_log: true

- name: Remove temporary MPI hostfile from {{ hpl_benchmark_group }}
  ansible.builtin.file:
    path: "/home/{{ hpl_benchmark_user }}/.ssh/hpl-{{ hpl_effective_run_id }}-{{ hpl_benchmark_group }}.hosts"
    state: absent
  delegate_to: "{{ hpl_group_matrix[hpl_benchmark_group].coordinator }}"
  become: true
  no_log: true
