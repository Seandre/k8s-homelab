---
- name: Run isolated standard comparison on {{ hpl_target }}
  ansible.builtin.include_role:
    name: hpl
    tasks_from: run_case
  vars:
    hpl_delegate: "{{ hpl_target }}"
    hpl_case_label: isolated-standard
    hpl_case_stage: isolated-node
    hpl_case_comparison: standard
    hpl_case_target: "{{ hpl_target }}"
    hpl_case_cpu_family: "{{ hostvars[hpl_target].hpl_cpu_family }}"
    hpl_case_n: 21504
    hpl_case_nb: 192
    hpl_case_ranks: "{{ hostvars[hpl_target].hpl_ranks }}"
    hpl_case_p: "{{ hostvars[hpl_target].hpl_process_p }}"
    hpl_case_q: "{{ hostvars[hpl_target].hpl_process_q }}"
    hpl_case_warmups: 1
    hpl_case_runs: 5

- name: Read physical memory for tuned capacity on {{ hpl_target }}
  ansible.builtin.command:
    argv:
      - awk
      - /MemTotal/
      - /proc/meminfo
  register: hpl_node_memtotal
  changed_when: false
  delegate_to: "{{ hpl_target }}"
  become: false

- name: Calculate tuned capacity N on {{ hpl_target }}
  ansible.builtin.set_fact:
    hpl_node_capacity_n: >-
      {{
        (
          (
            (
              ((hpl_node_memtotal.stdout.split()[1] | int) * 1024
              * (hpl_capacity_memory_percent | int) / 100 / 8) ** 0.5
            ) // (hpl_selected_nb | int)
          ) * (hpl_selected_nb | int)
        ) | int
      }}

- name: Run isolated tuned-capacity comparison on {{ hpl_target }}
  ansible.builtin.include_role:
    name: hpl
    tasks_from: run_case
  vars:
    hpl_delegate: "{{ hpl_target }}"
    hpl_case_label: isolated-capacity
    hpl_case_stage: isolated-capacity-node
    hpl_case_comparison: capacity
    hpl_case_target: "{{ hpl_target }}"
    hpl_case_cpu_family: "{{ hostvars[hpl_target].hpl_cpu_family }}"
    hpl_case_n: "{{ hpl_node_capacity_n }}"
    hpl_case_nb: "{{ hpl_selected_nb }}"
    hpl_case_ranks: "{{ hostvars[hpl_target].hpl_ranks }}"
    hpl_case_p: "{{ hostvars[hpl_target].hpl_process_p }}"
    hpl_case_q: "{{ hostvars[hpl_target].hpl_process_q }}"
    hpl_case_warmups: 1
    hpl_case_runs: 5
