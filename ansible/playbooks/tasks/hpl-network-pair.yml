---
- name: Create network result directory on {{ hpl_network_pair.0 }}
  ansible.builtin.file:
    path: "{{ hpl_result_root }}/{{ hpl_effective_run_id }}/network"
    state: directory
    owner: "{{ hpl_benchmark_user }}"
    group: "{{ hpl_benchmark_user }}"
    mode: "0750"
  delegate_to: "{{ hpl_network_pair.0 }}"
  become: true

- name: Measure latency | {{ hpl_network_pair.0 ~ ' to ' ~ hpl_network_pair.1 }}
  ansible.builtin.command:
    argv:
      - ping
      - -c
      - "10"
      - "{{ hostvars[hpl_network_pair.1].ansible_host }}"
  register: hpl_pair_ping
  changed_when: false
  failed_when: false
  delegate_to: "{{ hpl_network_pair.0 }}"
  become: false

- name: Store pairwise latency result
  ansible.builtin.copy:
    dest: "{{ hpl_result_root }}/{{ hpl_effective_run_id }}/network/latency-{{ hpl_network_pair.0 }}-to-{{ hpl_network_pair.1 }}.txt"
    content: "{{ hpl_pair_ping.stdout }}\n{{ hpl_pair_ping.stderr }}\n"
    owner: "{{ hpl_benchmark_user }}"
    group: "{{ hpl_benchmark_user }}"
    mode: "0640"
  delegate_to: "{{ hpl_network_pair.0 }}"
  become: true

- name: Start one-shot iperf3 server on {{ hpl_network_pair.1 }}
  ansible.builtin.command:
    argv:
      - iperf3
      - --server
      - --one-off
      - --port
      - "{{ hpl_iperf_port }}"
  async: 60
  poll: 0
  register: hpl_pair_iperf_server
  changed_when: true
  delegate_to: "{{ hpl_network_pair.1 }}"
  become: true
  become_user: "{{ hpl_benchmark_user }}"

- name: Allow one-shot iperf3 server to bind
  ansible.builtin.pause:
    seconds: 1

- name: Measure throughput | {{ hpl_network_pair.0 ~ ' to ' ~ hpl_network_pair.1 }}
  ansible.builtin.command:
    argv:
      - iperf3
      - --client
      - "{{ hostvars[hpl_network_pair.1].ansible_host }}"
      - --port
      - "{{ hpl_iperf_port }}"
      - --time
      - "10"
      - --json
  register: hpl_pair_iperf_client
  changed_when: false
  failed_when: false
  delegate_to: "{{ hpl_network_pair.0 }}"
  become: true
  become_user: "{{ hpl_benchmark_user }}"

- name: Poll one-shot iperf3 server to completion
  ansible.builtin.async_status:
    jid: "{{ hpl_pair_iperf_server.ansible_job_id }}"
  register: hpl_pair_iperf_server_status
  until: hpl_pair_iperf_server_status.finished
  retries: 15
  delay: 2
  failed_when: false
  delegate_to: "{{ hpl_network_pair.1 }}"
  become: true
  become_user: "{{ hpl_benchmark_user }}"

- name: Stop an unconsumed one-shot iperf3 server
  ansible.builtin.command:
    argv:
      - pkill
      - -f
      - "iperf3 --server --one-off --port {{ hpl_iperf_port }}"
  changed_when: true
  failed_when: false
  when: not hpl_pair_iperf_server_status.finished | default(false)
  delegate_to: "{{ hpl_network_pair.1 }}"
  become: true

- name: Store pairwise throughput result
  ansible.builtin.copy:
    dest: "{{ hpl_result_root }}/{{ hpl_effective_run_id }}/network/throughput-{{ hpl_network_pair.0 }}-to-{{ hpl_network_pair.1 }}.json"
    content: "{{ hpl_pair_iperf_client.stdout }}\n"
    owner: "{{ hpl_benchmark_user }}"
    group: "{{ hpl_benchmark_user }}"
    mode: "0640"
  delegate_to: "{{ hpl_network_pair.0 }}"
  become: true

- name: Require valid pairwise latency and throughput
  ansible.builtin.assert:
    that:
      - hpl_pair_ping.rc == 0
      - hpl_pair_iperf_client.rc == 0
    fail_msg: >-
      Network characterization failed for {{ hpl_network_pair.0 }} to
      {{ hpl_network_pair.1 }}; distributed HPL would not be interpretable.
