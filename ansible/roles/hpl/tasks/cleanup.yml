---
- name: Find stale HPL coordinator private keys
  ansible.builtin.find:
    paths:
      - "/home/{{ hpl_benchmark_user }}/.ssh"
      - "/home/{{ hpl_benchmark_user }}/.ssh/config.d"
    patterns:
      - hpl-*
      - hpl-*.conf
    file_type: file
  register: hpl_stale_key_files

- name: Remove stale HPL coordinator key files
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ hpl_stale_key_files.files }}"
  no_log: true

- name: Remove stale HPL authorization entries
  ansible.builtin.lineinfile:
    path: "/home/{{ hpl_benchmark_user }}/.ssh/authorized_keys"
    regexp: ' hpl-benchmark-[A-Za-z0-9._-]+$'
    state: absent

- name: Remove HPL temporary archives
  ansible.builtin.find:
    paths: /tmp
    patterns: hpl-results-*.tar.gz
    file_type: file
  register: hpl_stale_archives

- name: Delete HPL temporary archives
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ hpl_stale_archives.files }}"
