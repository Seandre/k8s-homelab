---
timezone: America/Los_Angeles
lab_domain: lab.home.arpa
public_lab_domain: lab.seandre.dev
network_name: Servers
vlan_id: 40
gateway: 192.168.40.1
dns_server: 192.168.40.1
proxmox_host: pve-01
proxmox_ip: 192.168.40.20
proxmox_fqdn: pve-01.lab.seandre.dev
proxmox_vm_storage: vmdata
k3s_disable_components:
  - traefik
  - servicelb
k3s_kubeconfig_local_path: kubeconfig/homelab.kubeconfig

# top500-benchmark-derived HPL defaults. Per-host rank and process-grid values
# live in the inventory so a VM resize cannot silently change the comparison.
hpl_top500_upstream_repository: https://github.com/geerlingguy/top500-benchmark
hpl_top500_upstream_revision: e71588f33fcf358910047de25720e3147d627be4
hpl_mpich_version: "4.3.2"
hpl_mpich_archive_sha256: 47d774587a7156a53752218c811c852e70ac44db9c502dc3f399b4cb817e3818
hpl_mpich_source_url: >-
  https://github.com/pmodels/mpich/releases/download/v{{ hpl_mpich_version }}/mpich-{{ hpl_mpich_version }}.tar.gz
hpl_mpich_with_device: ch3:nemesis
hpl_openblas_version: "0.3.33"
hpl_openblas_revision: 62bcfb0dc9f1cfa685fc04135c50e2780c303137
hpl_openblas_repository: https://github.com/OpenMathLib/OpenBLAS.git
hpl_version: "2.3"
hpl_archive_sha256: 32c5c17d22330e6f2337b681aded51637fb6008d3f0eb7c277b163fadd612830
hpl_source_url: "https://www.netlib.org/benchmark/hpl/hpl-{{ hpl_version }}.tar.gz"
hpl_install_root: /opt/top500
hpl_compile_flags: "-flto=auto -O3 -march=x86-64-v3"
hpl_binary_path: "{{ hpl_install_root }}/tmp/hpl-{{ hpl_version }}/bin/top500/xhpl"
hpl_mpirun_path: "{{ hpl_install_root }}/mpich/bin/mpirun"
hpl_result_root: /var/lib/hpl-results
hpl_benchmark_user: hplbench
hpl_build_async_timeout: 7200
hpl_build_async_poll: 30
hpl_async_timeout: 14400
hpl_async_poll: 30
hpl_max_extra_runs: 2
hpl_cov_limit_percent: 3.0
hpl_capacity_memory_percent: 75
hpl_iperf_port: 5202
hpl_group_matrix:
  benchmark_k3s:
    coordinator: k8s-control-01
    ranks: 10
    process_p: 2
    process_q: 5
    cpu_family: intel-core-i5-10500t
  benchmark_baremetal:
    coordinator: okd-cp-01
    ranks: 18
    process_p: 3
    process_q: 6
    cpu_family: amd-ryzen-5-pro-5650ge
