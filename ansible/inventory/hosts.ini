[benchmark_k3s:children]
k3s_control
k3s_workers

[benchmark_all:children]
benchmark_k3s
benchmark_baremetal

[benchmark_all:vars]
# Ubuntu 26.04 defaults /usr/bin/sudo to sudo-rs, whose authentication prompt
# is not compatible with Ansible's sudo become plugin. The classic sudo binary
# is installed alongside it and supports Ansible's prompt protocol.
ansible_become_exe=/usr/bin/sudo.ws

[all:vars]
ansible_user=sean
ansible_python_interpreter=/usr/bin/python3
